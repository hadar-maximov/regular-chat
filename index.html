<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>Bizzy · Web Summit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ─── Tokens ─── */
:root {
  --bz-accent:      #F30C5F;
  --bz-accent-soft: rgba(243,12,95,.10);
  --bz-accent-mid:  rgba(243,12,95,.22);
  --bz-yellow:      #F5E000;
  --surface:        #FFFFFF;
  --surface-2:      #F7F5F0;
  --border:         #ECEAE3;
  --border-soft:    #F1EFE8;
  --text-1:         #1A1915;
  --text-2:         #57554E;
  --text-3:         #8F8C84;
  --text-4:         #B5B2A8;
  --font: 'Manrope', system-ui, sans-serif;
  --r-sm: 10px; --r-md: 14px; --r-lg: 20px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top:    env(safe-area-inset-top, 0px);
}
*, *::before, *::after { box-sizing: border-box; }
html { height: 100%; -webkit-text-size-adjust: 100%; }
body {
  margin: 0; padding: 0;
  font-family: var(--font);
  color: var(--text-1);
  background: #FAFAF8;
  height: 100%;
  -webkit-font-smoothing: antialiased;
}

/* ─── App shell ─── */
#app {
  width: 100%;
  height: 100%;
  background: #FAFAF8;
}

/* ─── App bar (fixed top) ─── */
.app-bar {
  display: flex; align-items: center;
  justify-content: space-between;
  position: fixed;
  top: 0; left: 0; right: 0;
  padding: calc(var(--safe-top) + 10px) 16px 10px;
  border-bottom: 1px solid var(--border-soft);
  background: rgba(255,255,255,.96);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  z-index: 5;
}
.app-bar-left { display: flex; align-items: center; gap: 10px; }
.bz-logo {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--bz-yellow);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.bz-logo svg { width: 20px; height: 20px; }
.app-bar-event-name { font-size: 14px; font-weight: 700; color: var(--text-1); line-height: 1.2; letter-spacing: -.2px; }
.app-bar-event-date { font-size: 11px; font-weight: 500; color: var(--text-3); }
.app-bar-actions { display: flex; gap: 4px; align-items: center; }
.app-bar-btn {
  width: 36px; height: 36px; border-radius: 50%; border: 0;
  background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-1); position: relative; -webkit-tap-highlight-color: transparent;
}
.bell-badge::after {
  content: ''; position: absolute; top: 7px; right: 7px;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--bz-accent); border: 2px solid #FFF;
}
.user-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--text-1); color: #FFF;
  font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  letter-spacing: .5px; cursor: pointer;
}
.app-bar-bizzy {
  width: 38px; height: 38px; border-radius: 50%; border: 0;
  background: var(--bz-accent); color: #FFF; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  position: relative; box-shadow: 0 2px 10px rgba(243,12,95,.35);
  -webkit-tap-highlight-color: transparent;
  transition: transform .1s;
}
.app-bar-bizzy:active { transform: scale(.94); }
.app-bar-bizzy::after {
  content: ''; position: absolute; top: 5px; right: 5px;
  width: 8px; height: 8px; border-radius: 50%;
  background: #19C37D; border: 2px solid var(--bz-accent);
}

/* ─── Scrollable page ─── */
#page-body {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
  /* top/bottom padding set dynamically by JS after measuring bars */
  padding-top: 68px;
  padding-bottom: 72px;
  background: #FAFAF8;
}
#page-body::-webkit-scrollbar { display: none; }

/* ─── Tab bar (fixed bottom) ─── */
.tab-bar {
  display: flex; justify-content: space-around;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  padding: 6px 10px calc(var(--safe-bottom) + 8px);
  background: rgba(255,255,255,.96);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-top: 1px solid var(--border-soft);
  z-index: 4;
}
.tab {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 6px 10px; border: 0; background: transparent;
  cursor: pointer; color: var(--text-3);
  font-family: var(--font); font-size: 10px; font-weight: 600;
  transition: color .15s; letter-spacing: .2px;
  -webkit-tap-highlight-color: transparent; min-width: 52px;
}
.tab.on { color: var(--bz-accent); }
.tab svg { width: 22px; height: 22px; }

/* ─── Hero ─── */
.hero { padding: 20px 18px 16px; }
.hero[data-life="pre"]     { background: linear-gradient(160deg,#F3EEFF,#FFF 70%); }
.hero[data-life="arrival"] { background: linear-gradient(160deg,#FFF0E8,#FFF 70%); }
.hero[data-life="live"]    { background: linear-gradient(160deg,#E8F3FF,#FFF 70%); }
.hero[data-life="post"]    { background: linear-gradient(160deg,#E8F5EC,#FFF 70%); }
.eyebrow {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 10px; font-weight: 700; letter-spacing: 1.6px;
  text-transform: uppercase; color: var(--text-3); margin-bottom: 8px;
}
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: #19C37D; animation: livePulse 1.6s infinite; }
@keyframes livePulse { 0%{box-shadow:0 0 0 0 rgba(25,195,125,.55)} 70%{box-shadow:0 0 0 6px rgba(25,195,125,0)} 100%{box-shadow:0 0 0 0 rgba(25,195,125,0)} }
.hero-title { font-size: 30px; font-weight: 800; line-height: 1.1; letter-spacing: -1px; color: var(--text-1); }
.hero-title em { font-style: italic; color: var(--bz-accent); }
.hero-sub { font-size: 13px; font-weight: 500; color: var(--text-2); margin-top: 6px; line-height: 1.45; }

/* ─── Anchor card ─── */
.anchor-card {
  margin: 0 16px 0; background: var(--text-1); border-radius: var(--r-lg);
  padding: 14px 16px; color: #FFF; display: flex; align-items: center; gap: 12px;
}
.anchor-card-icon { width: 42px; height: 42px; border-radius: 12px; background: rgba(255,255,255,.12); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.anchor-card-body { flex: 1; min-width: 0; }
.anchor-card-label { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: rgba(255,255,255,.5); margin-bottom: 2px; }
.anchor-card-main { font-size: 15px; font-weight: 700; letter-spacing: -.3px; line-height: 1.25; }
.anchor-card-sub { font-size: 11.5px; font-weight: 500; color: rgba(255,255,255,.6); margin-top: 2px; }
.anchor-card-cta { background: var(--bz-accent); border: 0; color: #FFF; font-family: var(--font); font-size: 12px; font-weight: 700; padding: 8px 14px; border-radius: 10px; cursor: pointer; white-space: nowrap; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }

/* ─── Prompts ─── */
.prompts { padding: 16px 16px 6px; }
.prompts-label { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-3); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.prompts-list { display: flex; flex-direction: column; gap: 6px; }
.prompt-chip {
  display: flex; align-items: center; gap: 8px;
  background: #FFF; border: 1px solid var(--border); border-radius: 999px;
  padding: 11px 14px; font-family: var(--font); font-size: 13px; font-weight: 600;
  color: var(--text-1); cursor: pointer; text-align: left;
  transition: border-color .15s, background .15s; letter-spacing: -.1px;
  -webkit-tap-highlight-color: transparent;
}
.prompt-chip:active { background: var(--bz-accent-soft); border-color: var(--bz-accent-mid); }
.prompt-chip-icon { color: var(--bz-accent); flex-shrink: 0; display: inline-flex; }

/* ─── Section ─── */
.section { padding: 0 16px 16px; }
.section-title { font-size: 15px; font-weight: 800; letter-spacing: -.4px; color: var(--text-1); margin: 0 0 10px; }

/* ─── Cards ─── */
.bzc { display: flex; gap: 11px; align-items: flex-start; padding: 12px; background: #FFF; border: 1px solid var(--border); border-radius: var(--r-md); font-family: var(--font); cursor: pointer; transition: border-color .15s; -webkit-tap-highlight-color: transparent; }
.bzc:active { border-color: var(--bz-accent-mid); background: var(--bz-accent-soft); }
.bzc + .bzc { margin-top: 7px; }
.bzc-ph { width: 44px; height: 44px; border-radius: 50%; overflow: hidden; flex-shrink: 0; background: #EEF2F7; }
.bzc-ph img { width: 100%; height: 100%; object-fit: cover; display: block; }
.bzc-body { flex: 1; min-width: 0; }
.bzc-name { font-size: 14px; font-weight: 700; letter-spacing: -.2px; color: var(--text-1); line-height: 1.2; }
.bzc-role { font-size: 11.5px; font-weight: 500; color: var(--text-2); margin-top: 2px; }
.bzc-meta { font-size: 11px; font-weight: 500; color: var(--text-3); margin-top: 3px; display: flex; align-items: center; gap: 4px; }
.bzc-muts { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
.bzc-mut { font-size: 10px; font-weight: 600; background: var(--bz-accent-soft); color: var(--bz-accent); padding: 2px 7px; border-radius: 999px; }
.bzc-actions { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; }
.bzc-btn { font-family: var(--font); font-size: 11.5px; font-weight: 700; padding: 7px 11px; border-radius: 9px; border: 1px solid var(--border); background: #FFF; color: var(--text-1); cursor: pointer; display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; letter-spacing: -.1px; -webkit-tap-highlight-color: transparent; }
.bzc-btn-primary { background: var(--text-1); color: #FFF; border-color: var(--text-1); }
.bzc-btn-soft { background: var(--bz-accent-soft); color: var(--bz-accent); border-color: transparent; }
.bzc-tag { display: inline-flex; align-items: center; gap: 5px; font-size: 9px; font-weight: 700; letter-spacing: 1.1px; text-transform: uppercase; padding: 3px 7px; border-radius: 999px; margin-bottom: 4px; }
.bzc-tag-live { background: rgba(220,38,38,.10); color: #B91C1C; }
.bzc-tag-next { background: rgba(243,12,95,.10); color: var(--bz-accent); }
.bzc-dot { width: 5px; height: 5px; border-radius: 50%; background: #DC2626; animation: bzcPulse 1.4s infinite; }
@keyframes bzcPulse { 0%{box-shadow:0 0 0 0 rgba(220,38,38,.6)} 70%{box-shadow:0 0 0 5px rgba(220,38,38,0)} 100%{box-shadow:0 0 0 0 rgba(220,38,38,0)} }
.bzc-session .bzc-time { width: 44px; flex-shrink: 0; text-align: center; background: var(--surface-2); border-radius: 9px; padding: 8px 0; align-self: stretch; display: flex; flex-direction: column; justify-content: center; align-items: center; }
.bzc-time-num { font-size: 20px; font-weight: 800; line-height: 1; color: var(--text-1); }
.bzc-time-min { font-size: 9.5px; font-weight: 600; color: var(--text-3); margin-top: 2px; }
.bzc-wifi { align-items: center; }
.bzc-wifi-icon { width: 40px; height: 40px; border-radius: 50%; background: var(--bz-accent-soft); color: var(--bz-accent); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.bzc-wifi-row { display: flex; align-items: baseline; gap: 8px; font-size: 12.5px; line-height: 1.5; }
.bzc-wifi-lbl { font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-3); width: 62px; flex-shrink: 0; }
.bzc-wifi-val { font-size: 12px; font-weight: 700; color: var(--text-1); }
.bzc-logo { width: 42px; height: 42px; border-radius: 9px; background: linear-gradient(135deg, var(--text-1), #444); color: #FFF; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 800; flex-shrink: 0; }
.bzc-schedule { flex-direction: column; gap: 0; padding: 4px 12px; }
.bzc-sch-row { display: flex; gap: 12px; padding: 9px 0; border-bottom: 1px dashed var(--border); }
.bzc-sch-row:last-child { border-bottom: 0; }
.bzc-sch-time { font-size: 11.5px; font-weight: 700; color: var(--text-1); width: 40px; flex-shrink: 0; }
.bzc-sch-title { font-size: 13px; font-weight: 700; color: var(--text-1); display: flex; align-items: center; gap: 7px; }
.bzc-sch-meta { font-size: 11px; font-weight: 500; color: var(--text-3); margin-top: 2px; }

/* ─── Drawer ─── */
.drawer-scrim { position: fixed; inset: 0; background: rgba(0,0,0,.32); opacity: 0; pointer-events: none; transition: opacity .25s; z-index: 60; }
.drawer-scrim.open { opacity: 1; pointer-events: auto; }
.drawer {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: 90%; max-width: 380px;
  background: #FAFAFF;
  border-top-left-radius: 24px; border-bottom-left-radius: 24px;
  transform: translateX(100%);
  transition: transform .28s cubic-bezier(.2,.7,.2,1);
  z-index: 70; display: flex; flex-direction: column; overflow: hidden;
  box-shadow: -8px 0 40px rgba(0,0,0,.18);
}
.drawer.open { transform: translateX(0); }
.drawer-head { padding: calc(var(--safe-top) + 14px) 14px 12px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border-soft); background: #FFF; flex-shrink: 0; }
.drawer-head-glyph { width: 36px; height: 36px; border-radius: 50%; background: var(--bz-accent); color: #FFF; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 2px 8px rgba(243,12,95,.30); position: relative; }
.drawer-head-glyph::after { content: ''; position: absolute; top: 1px; right: 1px; width: 8px; height: 8px; border-radius: 50%; background: #19C37D; border: 2px solid var(--bz-accent); }
.drawer-head-text { flex: 1; min-width: 0; }
.drawer-head-name { font-size: 15px; font-weight: 800; letter-spacing: -.4px; }
.drawer-head-status { font-size: 10.5px; font-weight: 500; color: var(--text-3); display: flex; align-items: center; gap: 4px; margin-top: 2px; }
.drawer-head-actions { display: flex; gap: 2px; }
.drawer-icon-btn { width: 32px; height: 32px; border: 0; background: transparent; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-2); -webkit-tap-highlight-color: transparent; }
.drawer-thread { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 14px 12px 10px; display: flex; flex-direction: column; gap: 9px; }
.drawer-thread::-webkit-scrollbar { display: none; }
.bubble { max-width: 88%; padding: 10px 14px; border-radius: 18px; font-size: 14px; font-weight: 500; line-height: 1.47; animation: bubbleIn .22s ease-out; }
@keyframes bubbleIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
.bubble.from-bizzy { align-self: flex-start; background: #FFF; border: 1px solid var(--border); color: var(--text-1); border-bottom-left-radius: 5px; }
.bubble.from-user { align-self: flex-end; background: var(--text-1); color: #FFF; border-bottom-right-radius: 5px; }
.bubble-cards { align-self: stretch; background: transparent; padding: 0; border: 0; max-width: 100%; animation: bubbleIn .28s ease-out; }
.bubble-chips { align-self: stretch; display: flex; flex-wrap: wrap; gap: 6px; padding-top: 3px; animation: bubbleIn .32s ease-out; }
.bubble-chip { background: #FFF; border: 1px solid var(--border); color: var(--text-1); font-family: var(--font); font-size: 13px; font-weight: 600; padding: 8px 14px; border-radius: 999px; cursor: pointer; transition: all .15s; -webkit-tap-highlight-color: transparent; }
.bubble-chip:active { background: var(--bz-accent-soft); border-color: var(--bz-accent-mid); color: var(--bz-accent); }
.bubble-chip.chip-confirm { background: var(--bz-accent); color: #FFF; border-color: var(--bz-accent); }
.typing { align-self: flex-start; background: #FFF; border: 1px solid var(--border); padding: 11px 14px; border-radius: 18px; border-bottom-left-radius: 5px; display: inline-flex; align-items: center; gap: 4px; }
.typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--text-3); animation: typingDot 1.2s infinite; }
.typing span:nth-child(2){animation-delay:.15s} .typing span:nth-child(3){animation-delay:.3s}
@keyframes typingDot { 0%,60%,100%{transform:translateY(0);opacity:.4} 30%{transform:translateY(-3px);opacity:1} }
.drawer-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px 24px 16px; gap: 10px; }
.drawer-empty-glyph { width: 52px; height: 52px; border-radius: 50%; background: var(--bz-accent-soft); color: var(--bz-accent); display: flex; align-items: center; justify-content: center; }
.drawer-empty-title { font-size: 22px; font-weight: 800; letter-spacing: -.5px; }
.drawer-empty-sub { font-size: 13px; font-weight: 500; color: var(--text-2); line-height: 1.5; max-width: 220px; }
.drawer-empty-prompts { display: flex; flex-direction: column; gap: 7px; margin-top: 6px; width: 100%; }

/* ─── Composer (sticky bottom of drawer) ─── */
.drawer-composer {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px calc(var(--safe-bottom) + 12px);
  border-top: 1px solid var(--border-soft);
  background: #FFF; flex-shrink: 0;
}
.drawer-composer input {
  flex: 1; background: var(--surface-2); border: 1.5px solid transparent;
  border-radius: 999px; padding: 12px 16px;
  font-family: var(--font); font-size: 15px; font-weight: 500;
  color: var(--text-1); outline: none;
  -webkit-appearance: none; appearance: none;
}
.drawer-composer input:focus { border-color: var(--bz-accent-mid); background: #FFF; }
.drawer-composer input::placeholder { color: var(--text-3); }
.send-btn {
  width: 42px; height: 42px; border-radius: 50%; border: 0;
  background: var(--bz-accent); color: #FFF; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(243,12,95,.32); -webkit-tap-highlight-color: transparent;
}
.send-btn:active { transform: scale(.93); }
.send-btn:disabled { background: var(--text-4); box-shadow: none; }

/* ─── Error toast ─── */
.error-toast { align-self: flex-start; background: #FFF0F4; border: 1px solid rgba(243,12,95,.25); color: #9B1239; padding: 10px 14px; border-radius: 14px; font-size: 13px; font-weight: 500; animation: bubbleIn .22s ease-out; }

/* ─── Peek sheet ─── */
.peek-scrim { position: fixed; inset: 0; background: rgba(0,0,0,.28); opacity: 0; pointer-events: none; transition: opacity .22s; z-index: 80; }
.peek-scrim.open { opacity: 1; pointer-events: auto; }
.peek-sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #FFF; border-top-left-radius: 28px; border-top-right-radius: 28px;
  transform: translateY(100%); transition: transform .28s cubic-bezier(.2,.8,.2,1);
  z-index: 90; display: flex; flex-direction: column; overflow: hidden; max-height: 74%;
}
.peek-sheet.open { transform: translateY(0); }
.peek-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border); margin: 10px auto 0; flex-shrink: 0; }
.peek-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 14px 18px 0; }
.peek-body::-webkit-scrollbar { display: none; }
.peek-hero { display: flex; align-items: flex-start; gap: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--border-soft); margin-bottom: 14px; }
.peek-photo { width: 62px; height: 62px; border-radius: 50%; overflow: hidden; flex-shrink: 0; background: #EEF2F7; }
.peek-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
.peek-photo-session { width: 62px; height: 62px; border-radius: 14px; overflow: hidden; flex-shrink: 0; background: var(--surface-2); display: flex; align-items: center; justify-content: center; color: var(--bz-accent); }
.peek-info { flex: 1; min-width: 0; }
.peek-name { font-size: 18px; font-weight: 800; letter-spacing: -.4px; line-height: 1.2; }
.peek-sub { font-size: 12.5px; font-weight: 500; color: var(--text-2); margin-top: 3px; }
.peek-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
.peek-tag { font-size: 10.5px; font-weight: 600; background: var(--bz-accent-soft); color: var(--bz-accent); padding: 3px 9px; border-radius: 999px; }
.peek-rows { display: flex; flex-direction: column; }
.peek-row { display: flex; align-items: flex-start; gap: 10px; padding: 11px 0; border-bottom: 1px solid var(--border-soft); }
.peek-row:last-child { border-bottom: 0; }
.peek-row-icon { width: 28px; height: 28px; border-radius: 8px; background: var(--surface-2); color: var(--text-3); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
.peek-row-label { font-size: 10px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: var(--text-3); margin-bottom: 2px; }
.peek-row-value { font-size: 13.5px; font-weight: 600; color: var(--text-1); line-height: 1.35; }
.peek-row-hint { font-size: 11.5px; font-weight: 500; color: var(--text-2); margin-top: 2px; }

.detail-banner-avatar img { width: 100%; height: 100%; object-fit: cover; }
.detail-body { padding: 40px 18px 0; }
.detail-name { font-size: 22px; font-weight: 800; letter-spacing: -.6px; line-height: 1.15; }
.detail-role { font-size: 13px; font-weight: 500; color: var(--text-2); margin-top: 4px; }
.detail-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
.detail-tag { font-size: 11px; font-weight: 600; background: var(--bz-accent-soft); color: var(--bz-accent); padding: 4px 10px; border-radius: 999px; }
.detail-section { padding: 18px 18px 0; }
.detail-section-title { font-size: 10px; font-weight: 700; letter-spacing: 1.4px; text-transform: uppercase; color: var(--text-3); margin-bottom: 10px; }
.detail-card { background: #FFF; border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 8px; }
.detail-stat-row { display: flex; gap: 8px; margin-bottom: 8px; }
.detail-stat { flex: 1; background: var(--surface-2); border-radius: 12px; padding: 12px 10px; text-align: center; }
.detail-stat-val { font-size: 22px; font-weight: 800; letter-spacing: -.8px; color: var(--text-1); }
.detail-stat-lbl { font-size: 9.5px; font-weight: 600; letter-spacing: .6px; text-transform: uppercase; color: var(--text-3); margin-top: 2px; }
.detail-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border-soft); }
.detail-row:last-child { border-bottom: 0; }
.detail-row-icon { width: 30px; height: 30px; border-radius: 9px; background: var(--surface-2); color: var(--text-3); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.detail-row-body { flex: 1; min-width: 0; }
.detail-row-label { font-size: 10px; font-weight: 700; letter-spacing: .7px; text-transform: uppercase; color: var(--text-3); }

.session-speaker-chip { display: flex; align-items: center; gap: 10px; background: var(--surface-2); border-radius: 12px; padding: 10px 12px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.session-speaker-chip img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }

<script>
(function () {

(function () {

  const STATE = {

  };

  const TABS = [
    { id: 'home',     label: 'Today',    icon: ICO.home },
    { id: 'agenda',   label: 'Agenda',   icon: ICO.agenda },
    { id: 'network',  label: 'Network',  icon: ICO.network },
    { id: 'schedule', label: 'Schedule', icon: ICO.schedule },
    { id: 'more',     label: 'More',     icon: ICO.more },

  const PAGE_TITLES = { home:'Today', agenda:'My Agenda', network:'Network', schedule:'Schedule', more:'More' };

  const TARGET_MAP = {
    home:'home', today:'home',

    sponsors:'more', map:'more', more:'more', settings:'more', profile:'more', wifi:'more',

  function normTarget(t) {
    if (!t) return 'home';
    const k = String(t).toLowerCase().replace(/[^a-z]/g, '');
    return TARGET_MAP[k] || 'more';

  /* ══════════════════════════════════════════════════════

  ══════════════════════════════════════════════════════ */

  ══════════════════════════════════════════════════════ */

    return `<div class="hero" data-life="${L}">

    </div>`;
  }

  /* ══════════════════════════════════════════════════════
     PROMPTS BLOCK
  ══════════════════════════════════════════════════════ */
  function promptsBlock() {
    const list = suggestionsFor(STATE.lifecycle, STATE.page);
    if (!list.length) return '';
    return `<div class="prompts">
      <div class="prompts-label">${ICO.spark} Ask Bizzy</div>

  const photo = (seed) => {
    const s = Number.isFinite(+seed) ? +seed : 12;
    return PHOTO_MAP[s] || PHOTO_MAP[12];
  };

  function speakerCard(c) {
    const mut = (c.mutuals||[]).slice(0,3).map(m=>`<span class="bzc-mut">${esc(m)}</span>`).join('');
    const encoded = encodeURIComponent(JSON.stringify(c));
    return `<article class="bzc bzc-speaker" data-card-type="speaker" data-card="${encoded}">
      <div class="bzc-ph"><img src="${photo(c.photoSeed)}" alt=""></div>
      <div class="bzc-body">
        <div class="bzc-name">${esc(c.name)}</div>
        <div class="bzc-role">${esc(c.title||'')}${c.company?' · '+esc(c.company):''}</div>
        ${c.session?`<div class="bzc-meta">${ICO.clock} ${esc(c.sessionTime||'')} · ${esc(c.session)}</div>`:''}
        ${mut?`<div class="bzc-muts">${mut}</div>`:''}
      </div>
      <div class="bzc-actions">
        <button class="bzc-btn bzc-btn-primary" onclick="event.stopPropagation()">Follow</button>
        <button class="bzc-btn" onclick="event.stopPropagation()">${ICO.arrow}</button>
      </div>
    </article>`;
  }

  function sessionCard(c) {
    const tagHtml = c.tag==='live'?`<span class="bzc-tag bzc-tag-live"><span class="bzc-dot"></span>Live now</span>`
      :c.tag==='next'?`<span class="bzc-tag bzc-tag-next">Up next</span>`:'';
    const cta = c.inAgenda
      ?`<button class="bzc-btn bzc-btn-soft" onclick="event.stopPropagation()">${ICO.check} Saved</button>`
      :`<button class="bzc-btn bzc-btn-primary" onclick="event.stopPropagation()">${ICO.plus} Add</button>`;
    const encoded = encodeURIComponent(JSON.stringify(c));
    return `<article class="bzc bzc-session" data-card-type="session" data-card="${encoded}">
      <div class="bzc-time">
        <div class="bzc-time-num">${esc((c.time||'').split(':')[0]||'')}</div>
        <div class="bzc-time-min">${esc((c.time||'').split(':')[1]||'00')}</div>
      </div>
      <div class="bzc-body">
        ${tagHtml}
        <div class="bzc-name">${esc(c.title)}</div>
        <div class="bzc-meta">${ICO.pin} ${esc(c.room||'')}${c.speaker?' · '+esc(c.speaker):''}</div>
      </div>
      <div class="bzc-actions">${cta}</div>
    </article>`;
  }

  function personCard(c) {
    const mut = (c.mutuals||[]).slice(0,3).map(m=>`<span class="bzc-mut">${esc(m)}</span>`).join('');
    const encoded = encodeURIComponent(JSON.stringify(c));
    return `<article class="bzc bzc-person" data-card-type="person" data-card="${encoded}">
      <div class="bzc-ph"><img src="${photo(c.photoSeed)}" alt=""></div>
      <div class="bzc-body">
        <div class="bzc-name">${esc(c.name)}</div>
        <div class="bzc-role">${esc(c.role||'')}${c.company?' · '+esc(c.company):''}</div>
        ${c.availability?`<div class="bzc-meta">${ICO.clock} ${esc(c.availability)}</div>`:''}
        ${mut?`<div class="bzc-muts">${mut}</div>`:''}
      </div>
      <div class="bzc-actions">
        <button class="bzc-btn bzc-btn-primary" onclick="event.stopPropagation()">${ICO.msg} Meet</button>
      </div>
    </article>`;
  }

  function placeCard(c) {
    return `<article class="bzc bzc-place">
      <div class="bzc-map">
        <svg viewBox="0 0 80 56" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
          <rect width="80" height="56" fill="#EEF2F7"/>
          <path d="M0 18 H 80 M 0 36 H 80 M 26 0 V 56 M 54 0 V 56" stroke="#D8DEE6" stroke-width=".6"/>
          <circle cx="40" cy="28" r="4" fill="#F30C5F"/>
          <circle cx="40" cy="28" r="9" fill="none" stroke="#F30C5F" stroke-opacity=".25" stroke-width="1.2"/>
        </svg>
      </div>
      <div class="bzc-body">
        <div class="bzc-name">${esc(c.name)}</div>
        <div class="bzc-meta">${ICO.pin} ${esc(c.level||'')}${c.walkMin?' · '+esc(c.walkMin)+' min walk':''}</div>
        ${c.mapHint?`<div class="bzc-hint">${esc(c.mapHint)}</div>`:''}
      </div>
      <div class="bzc-actions">
        <button class="bzc-btn bzc-btn-primary">Directions</button>
      </div>
    </article>`;
  }

  function wifiCard(c) {
    return `<article class="bzc bzc-wifi">
      <div class="bzc-wifi-icon">${ICO.wifi}</div>
      <div class="bzc-body">
        <div class="bzc-wifi-row"><span class="bzc-wifi-lbl">Network</span><span class="bzc-wifi-val">${esc(c.ssid)}</span></div>
        <div class="bzc-wifi-row"><span class="bzc-wifi-lbl">Password</span><span class="bzc-wifi-val">${esc(c.password)}</span></div>
      </div>
      <button class="bzc-btn bzc-btn-soft">${ICO.copy} Copy</button>
    </article>`;
  }

  function sponsorCard(c) {
    return `<article class="bzc bzc-sponsor">
      <div class="bzc-logo">${esc((c.name||'?').slice(0,1).toUpperCase())}</div>
      <div class="bzc-body">
        <div class="bzc-name">${esc(c.name)}</div>
        <div class="bzc-meta">${ICO.pin} ${esc(c.booth||'')}</div>
        ${c.hook?`<div class="bzc-hint">${esc(c.hook)}</div>`:''}
      </div>
      <div class="bzc-actions">
        <button class="bzc-btn bzc-btn-primary">${esc(c.ctaLabel||'Visit')}</button>
      </div>
    </article>`;
  }

  function scheduleCard(c) {
    const items = (c.items||[]).map(it => {
      const tag = it.tag==='live'?`<span class="bzc-tag bzc-tag-live"><span class="bzc-dot"></span>Live</span>`
        :it.tag==='next'?`<span class="bzc-tag bzc-tag-next">Next</span>`:'';
      return `<div class="bzc-sch-row">
        <div class="bzc-sch-time">${esc(it.time||'')}</div>
        <div class="bzc-sch-body">
          <div class="bzc-sch-title">${esc(it.title||'')} ${tag}</div>
          <div class="bzc-sch-meta">${esc(it.meta||'')}</div>
        </div>
      </div>`;
    }).join('');
    return `<article class="bzc bzc-schedule">${items}</article>`;
  }

  function renderCard(card) {
    if (!card || !card.type) return '';
    switch (card.type) {
      case 'speaker':  return speakerCard(card);
      case 'session':  return sessionCard(card);
      case 'person':   return personCard(card);
      case 'place':    return placeCard(card);
      case 'wifi':     return wifiCard(card);
      case 'sponsor':  return sponsorCard(card);
      case 'schedule': return scheduleCard(card);
      default:         return '';
    }
  }

  function renderCards(cards) { return (cards||[]).map(renderCard).join(''); }

  function pageContent() {
    if (STATE.page === 'home') {
      return heroBlock() + anchorCard() + promptsBlock() + homeBody();
    }
    if (STATE.page === 'agenda') {
      return `<div class="hero" data-life="${STATE.lifecycle}"><div class="eyebrow">YOUR DAY</div><div class="hero-title">My <em>agenda</em></div><div class="hero-sub">4 sessions saved · 2 to go</div></div>`
        + promptsBlock() + agendaBody();
    }
    if (STATE.page === 'network') {
      return `<div class="hero" data-life="${STATE.lifecycle}"><div class="eyebrow">PEOPLE NEARBY</div><div class="hero-title">Worth <em>meeting</em></div><div class="hero-sub">12 people match your interests</div></div>`
        + promptsBlock() + networkBody();
    }
    if (STATE.page === 'schedule') {
      return `<div class="hero" data-life="${STATE.lifecycle}"><div class="eyebrow">FULL PROGRAMME</div><div class="hero-title">Today's <em>sessions</em></div><div class="hero-sub">7 sessions across 3 venues</div></div>`

      + promptsBlock() + moreBody();

  // ── Matcher ────────────────────────────────────────────
  function matchResponse(query) {
    const q = query.toLowerCase().trim();

    // Exact or substring match
    for (const entry of RESPONSES) {
      for (const keyword of entry.match) {
        if (q === keyword || q.includes(keyword)) {
          return entry.response;
        }
      }
    }

    // Fuzzy: check if any word in the query matches any keyword
    const words = q.split(/\s+/);
    for (const entry of RESPONSES) {
      for (const keyword of entry.match) {
        const kwWords = keyword.split(/\s+/);
        if (kwWords.some(kw => words.some(w => w.length > 3 && w.includes(kw)))) {
          return entry.response;
        }
      }
    }

    return null;
  }

  // ── Fallback responses (rotate so it doesn't feel robotic) ─
  const FALLBACKS = [
    { kind:'chat',
      text: "I'm not sure I caught that — try asking about the schedule, who to meet, or how to get somewhere.",
      chips: ["What's on now?", "Who should I meet?", "WiFi password?"] },
    { kind:'chat',
      text: "Hmm, can you rephrase that? I'm best with specific things like names, sessions, or places.",
      chips: ["Show full schedule", "Find someone to meet", "Navigate somewhere"] },
    { kind:'chat',
      text: "Not quite sure what you mean — but I can help with sessions, people, navigation, or venue info.",
      chips: ["What's on now?", "Who should I meet?", "Hall B directions"] },
  ];
  let fallbackIdx = 0;

  // ── Main function (replaces askClaude) ─────────────────
  async function askClaude(query) {
    // Realistic delay: fast for simple lookups, slightly longer for complex
    const q = query.toLowerCase();
    const isSimple = ['wifi','password','hello','hi','hey','thanks'].some(w => q.includes(w));
    await bizzyDelay(isSimple ? 400 : 900 + Math.random() * 400);

    const response = matchResponse(query);
    if (response) return response;

    // Rotate fallbacks
    const fb = FALLBACKS[fallbackIdx % FALLBACKS.length];
    fallbackIdx++;
    return fb;
  }

  /* ══════════════════════════════════════════════════════
     RENDER
  ══════════════════════════════════════════════════════ */
  function tabLabel(id) {
    const t = TABS.find(x=>x.id===id);
    return t ? t.label : id;
  }

  function esc(s) {
    return String(s==null?'':s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function render() {
    document.getElementById('page-body').innerHTML = pageContent();
    document.getElementById('tab-bar').innerHTML = TABS.map(t =>
      `<button class="tab ${t.id===STATE.page?'on':''}" data-tab="${t.id}">
        ${t.icon}<span>${t.label}</span>
      </button>`).join('');
    renderDrawer();
    bindPage();
  }

  function renderDrawer() {
    const drawer = document.getElementById('drawer');
    const scrim  = document.getElementById('drawer-scrim');
    drawer.classList.toggle('open', STATE.drawerOpen);
    scrim.classList.toggle('open',  STATE.drawerOpen);

    const thread = document.getElementById('drawer-thread');

    if (!STATE.thread.length && !STATE.isTyping) {
      // Empty state — never blank. Show greeting + suggestions.
      const list = suggestionsFor(STATE.lifecycle, STATE.page);
      thread.innerHTML = `<div class="drawer-empty">
        <div class="drawer-empty-glyph">${ICO.spark}</div>
        <div class="drawer-empty-title">Hi Julia.</div>
        <div class="drawer-empty-sub">Ask me anything — schedules, directions, who to meet.</div>
        <div class="drawer-empty-prompts">
          ${list.slice(0,3).map(p=>`<button class="prompt-chip" data-prompt="${esc(p)}">
            <span class="prompt-chip-icon">${ICO.spark}</span>${esc(p)}
          </button>`).join('')}
        </div>
      </div>`;
      bindChips(thread);
      return;
    }

    let html = '';
    for (const m of STATE.thread) {
      if (m.role === 'user') {
        html += `<div class="bubble from-user">${esc(m.text)}</div>`;
      } else {
        if (m.isError) {
          html += `<div class="error-toast">${esc(m.text)}</div>`;
        } else if (m.text) {
          html += `<div class="bubble from-bizzy">${esc(m.text)}</div>`;
        }
        if (m.cards && m.cards.length) {
          html += `<div class="bubble bubble-cards">${renderCards(m.cards)}</div>`;
        }
        if (m.navTarget) {
          html += `<div class="bubble bubble-chips">
            <button class="bubble-chip chip-confirm" data-nav="${m.navTarget}">Yes, open ${tabLabel(m.navTarget)}</button>
            <button class="bubble-chip" data-stay>No, stay here</button>
          </div>`;
        } else if (m.chips && m.chips.length) {
          html += `<div class="bubble bubble-chips">${m.chips.map(c=>
            `<button class="bubble-chip" data-prompt="${esc(c)}">${esc(c)}</button>`
          ).join('')}</div>`;
        }
      }
    }
    if (STATE.isTyping) {
      html += `<div class="typing"><span></span><span></span><span></span></div>`;
    }
    thread.innerHTML = html;
    bindChips(thread);
    requestAnimationFrame(()=>{ thread.scrollTop = thread.scrollHeight; });
  }

  /* ══════════════════════════════════════════════════════
     EVENT BINDING
  ══════════════════════════════════════════════════════ */
  function bindPage() {
    document.querySelectorAll('#tab-bar .tab').forEach(b=>
      b.addEventListener('click', ()=>{ STATE.page = b.dataset.tab; render(); }));
    document.querySelectorAll('#page-body .prompt-chip').forEach(b=>
      b.addEventListener('click', ()=>{ STATE.drawerOpen = true; ask(b.dataset.prompt); }));
    // Card taps
    document.querySelectorAll('#page-body [data-card-type]').forEach(el => {
      el.addEventListener('click', () => {
        try {
          const type = el.dataset.cardType;
          const data = JSON.parse(decodeURIComponent(el.dataset.card));
          openPeek(type, data);
        } catch(e) { console.warn('card parse error', e); }
      });
    });
  }

  function bindChips(scope) {
    scope.querySelectorAll('[data-prompt]').forEach(b=>
      b.addEventListener('click', ()=>ask(b.dataset.prompt)));
    // Card taps in drawer thread
    scope.querySelectorAll('[data-card-type]').forEach(el => {
      el.addEventListener('click', () => {
        try {
          const type = el.dataset.cardType;
          const data = JSON.parse(decodeURIComponent(el.dataset.card));
          openPeek(type, data);
        } catch(e) { console.warn('card parse error', e); }
      });
    });
    scope.querySelectorAll('[data-nav]').forEach(b=>
      b.addEventListener('click', ()=>{
        const target = normTarget(b.dataset.nav);
        STATE.page = target;
        STATE.drawerOpen = false;
        STATE.thread.push({ role:'bizzy', text:`Opened ${tabLabel(target)}. I'm here when you need me.`, chips:[] });
        render();
      }));
    scope.querySelectorAll('[data-stay]').forEach(b=>
      b.addEventListener('click', ()=>{
        STATE.thread.push({ role:'bizzy', text:"Sure — staying here. What else?", chips: suggestionsFor(STATE.lifecycle,STATE.page).slice(0,3) });
        renderDrawer();
      }));

  async function ask(query) {
    if (!query || STATE.isTyping) return;
    STATE.drawerOpen = true;
    STATE.thread.push({ role:'user', text:query });
    STATE.isTyping = true;
    renderDrawer();

    const history = STATE.thread.map(m => ({
      role: m.role === 'user' ? 'user' : 'bizzy',
      text: m.text || (m.cards ? `[${m.cards.length} cards]` : ''),
    }));

    const resp = await askClaude(query, {
      lifecycle: STATE.lifecycle,
      page: STATE.page,
      history: history.slice(0,-1),
    });

    STATE.isTyping = false;

    if (resp.kind === 'cards') {
      STATE.thread.push({ role:'bizzy', text:resp.intro||'', cards:resp.cards, chips:resp.chips });
    } else if (resp.kind === 'nav-prompt') {
      STATE.thread.push({ role:'bizzy', text:resp.text, navTarget:normTarget(resp.target), chips:[] });
    } else if (resp.kind === 'plain') {
      const plainText = (resp.titleHtml||'').replace(/<[^>]+>/g,'') + (resp.body?' — '+resp.body:'');
      STATE.thread.push({ role:'bizzy', text:plainText, chips:resp.chips });
    } else if (resp.kind === 'error') {
      STATE.thread.push({ role:'bizzy', text:resp.text, isError:true, chips:resp.chips||['Try again','Ask something else'] });
    } else {
      // 'chat' or fallback
      STATE.thread.push({ role:'bizzy', text:resp.text, chips:resp.chips });
    }

    renderDrawer();
  }

  /* ══════════════════════════════════════════════════════
     DETAIL PAGES
  ══════════════════════════════════════════════════════ */
  function openDetail(type, data) {
    STATE.detail = { type, data };
    renderDetail(type, data);
    document.getElementById('detail-page').classList.add('open');
  }

  function closeDetail() {
    STATE.detail = null;
    document.getElementById('detail-page').classList.remove('open');
  }

  function renderDetail(type, data) {
    const rich = getRich(type, data.name || data.title) || {};
    const scroll = document.getElementById('detail-scroll');
    const navTitle = document.getElementById('detail-nav-title');
    const navAction = document.getElementById('detail-nav-action');

    if (type === 'person') {
      navTitle.textContent = data.name;
      navAction.textContent = 'Ask Bizzy';
      navAction.onclick = () => { closeDetail(); STATE.drawerOpen = true; ask(`Tell me more about ${data.name}`); };

      const gradients = ['135deg,#F3EEFF,#E8D8FF','135deg,#E8F5EC,#C8E8D0','135deg,#E8F3FF,#C8DCFF','135deg,#FFF0E8,#FFD8C0'];
      const grad = gradients[data.photoSeed % gradients.length];

      scroll.innerHTML = `
        <div class="detail-banner">
          <div class="detail-banner-bg" style="background:linear-gradient(${grad})"></div>
          <div class="detail-banner-avatar">
            <img src="${photo(data.photoSeed)}" alt="">
          </div>
        </div>
        <div class="detail-body">
          <div class="detail-name">${esc(data.name)}</div>
          <div class="detail-role">${esc(data.role||'')} at <strong>${esc(data.company||'')}</strong></div>
          <div class="detail-tags">${(data.mutuals||[]).map(t=>`<span class="detail-tag">${esc(t)}</span>`).join('')}</div>
        </div>

        ${rich.stats ? `<div class="detail-section">
          <div class="detail-section-title">At this event</div>
          <div class="detail-stat-row">
            <div class="detail-stat"><div class="detail-stat-val">${rich.stats.sessions}</div><div class="detail-stat-lbl">Sessions</div></div>
            <div class="detail-stat"><div class="detail-stat-val">${rich.stats.connections}</div><div class="detail-stat-lbl">Connected</div></div>
            <div class="detail-stat" style="background:var(--bz-accent-soft)"><div class="detail-stat-val" style="color:var(--bz-accent)">${rich.stats.score}%</div><div class="detail-stat-lbl" style="color:var(--bz-accent)">Match</div></div>
          </div>
        </div>` : ''}

        ${rich.bio ? `<div class="detail-section">
          <div class="detail-section-title">About</div>
          <div class="detail-card" style="font-size:13px;font-weight:500;line-height:1.6;color:var(--text-2)">${esc(rich.bio)}</div>
        </div>` : ''}

        <div class="detail-section">
          <div class="detail-section-title">Common interests</div>
          <div class="detail-card" style="flex-wrap:wrap;display:flex;gap:4px;padding:12px">
            ${['AI','product design','sustainability','fintech','design systems','climate'].map(t => {
              const shared = (data.mutuals||[]).includes(t);
              return `<span class="ci-pill ${shared ? 'shared' : ''}">${shared ? '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> ' : ''}${esc(t)}</span>`;
            }).join('')}
          </div>
        </div>

        ${rich.meetingSlots && rich.meetingSlots.length ? `<div class="detail-section">
          <div class="detail-section-title">Open meeting slots</div>
          <div class="detail-card">
            ${rich.meetingSlots.map((s,i) => `<div class="detail-row" ${i===rich.meetingSlots.length-1 ? '' : ''}>
              <div class="detail-row-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
              <div class="detail-row-body"><div class="detail-row-value">${esc(s)}</div></div>
              <button class="bzc-btn bzc-btn-primary" style="font-size:11px;padding:6px 10px" onclick="event.stopPropagation()">Request</button>
            </div>`).join('')}
          </div>
        </div>` : ''}

        ${rich.sessions && rich.sessions.length ? `<div class="detail-section">
          <div class="detail-section-title">Sessions attending</div>
          <div class="detail-card">
            ${rich.sessions.map(s => `<div class="detail-row">
              <div class="detail-row-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
              <div class="detail-row-body"><div class="detail-row-value">${esc(s)}</div></div>
            </div>`).join('')}
          </div>
        </div>` : ''}

        <div style="height:80px"></div>
        <div class="detail-cta-bar">
          <button class="peek-btn peek-btn-primary" style="flex:2" onclick="closeDetailAndAsk('Request a meeting with ${esc(data.name)}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            Request meeting
          </button>
          <button class="peek-btn peek-btn-secondary" style="flex:1" onclick="closeDetailAndAsk('Connect with ${esc(data.name)} on LinkedIn')">Connect</button>
        </div>`;

    } else if (type === 'speaker') {
      navTitle.textContent = data.name;
      navAction.textContent = 'Follow';
      navAction.onclick = () => { closeDetail(); STATE.drawerOpen = true; ask(`Follow ${data.name}`); };

      const gradients = ['135deg,#E8F3FF,#C8D8FF','135deg,#FFF0E8,#FFD8C0','135deg,#F3EEFF,#E0D0FF'];
      const grad = gradients[data.photoSeed % gradients.length];

      scroll.innerHTML = `
        <div class="detail-banner">
          <div class="detail-banner-bg" style="background:linear-gradient(${grad})"></div>
          <div class="detail-banner-avatar">
            <img src="${photo(data.photoSeed)}" alt="">
          </div>
        </div>
        <div class="detail-body">
          <div class="detail-name">${esc(data.name)}</div>
          <div class="detail-role">${esc(data.title||'')} · <strong>${esc(data.company||'')}</strong></div>
          <div class="detail-tags">${(data.mutuals||[]).map(t=>`<span class="detail-tag">${esc(t)}</span>`).join('')}</div>
        </div>

        ${rich.stats ? `<div class="detail-section">
          <div class="detail-section-title">Reach</div>
          <div class="detail-stat-row">
            <div class="detail-stat"><div class="detail-stat-val">${(rich.stats.followers/1000).toFixed(0)}k</div><div class="detail-stat-lbl">Followers</div></div>
            <div class="detail-stat"><div class="detail-stat-val">${rich.stats.talks}</div><div class="detail-stat-lbl">Talks</div></div>
            <div class="detail-stat" style="background:var(--bz-accent-soft)"><div class="detail-stat-val" style="color:var(--bz-accent)">${(data.mutuals||[]).length}</div><div class="detail-stat-lbl" style="color:var(--bz-accent)">Shared</div></div>
          </div>
        </div>` : ''}

        ${rich.bio ? `<div class="detail-section">
          <div class="detail-section-title">About</div>
          <div class="detail-card" style="font-size:13px;font-weight:500;line-height:1.6;color:var(--text-2)">${esc(rich.bio)}</div>
        </div>` : ''}

        ${data.session ? `<div class="detail-section">
          <div class="detail-section-title">Speaking today</div>
          <div class="detail-card" style="cursor:pointer" onclick="openDetailFromSession('${esc(data.session)}')">
            <div class="session-speaker-chip" style="background:transparent;padding:0">
              <div style="background:var(--bz-accent-soft);width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--bz-accent);flex-shrink:0">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
              </div>
              <div>
                <div class="session-speaker-chip-name">${esc(data.session)}</div>
                <div class="session-speaker-chip-role">${esc(data.sessionTime||'')}</div>
              </div>
            </div>
            ${rich.talkSummary ? `<div style="margin-top:10px;font-size:12px;font-weight:500;line-height:1.5;color:var(--text-2)">${esc(rich.talkSummary)}</div>` : ''}
          </div>
        </div>` : ''}

        ${rich.previousTalks && rich.previousTalks.length ? `<div class="detail-section">
          <div class="detail-section-title">Previously spoke at</div>
          <div class="detail-card">
            ${rich.previousTalks.map((t,i) => `<div class="detail-row">
              <div class="detail-row-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
              <div class="detail-row-body"><div class="detail-row-value">${esc(t)}</div></div>
            </div>`).join('')}
          </div>
        </div>` : ''}

        <div style="height:80px"></div>
        <div class="detail-cta-bar">
          <button class="peek-btn peek-btn-accent" style="flex:2" onclick="openDetailFromSession('${esc(data.session||'')}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            View session
          </button>
          <button class="peek-btn peek-btn-secondary" style="flex:1" onclick="closeDetailAndAsk('Follow ${esc(data.name)}')">Follow</button>
        </div>`;

    } else if (type === 'session') {
      const rData = getRich('session', data.title) || {};
      navTitle.textContent = rData.track || 'Session';
      navAction.textContent = data.inAgenda ? 'Saved' : 'Add';
      navAction.style.color = data.inAgenda ? 'var(--text-3)' : 'var(--bz-accent)';
      navAction.onclick = () => { closeDetailAndAsk((data.inAgenda ? 'Remove ' : 'Add ') + data.title + ' from my agenda'); };

      const tagHtml = data.tag==='live'
        ? `<span style="display:inline-flex;align-items:center;gap:5px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:rgba(220,38,38,.10);color:#B91C1C;padding:3px 8px;border-radius:999px;margin-bottom:8px"><span style="width:5px;height:5px;border-radius:50%;background:#DC2626;animation:bzcPulse 1.4s infinite;display:inline-block"></span>Live now</span>`
        : data.tag==='next'
        ? `<span style="display:inline-flex;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:rgba(243,12,95,.10);color:var(--bz-accent);padding:3px 8px;border-radius:999px;margin-bottom:8px">Up next</span>`
        : '';

      const trackColors = {'Design & Product':'135deg,#E8F3FF,#C8DCFF','Climate & Society':'135deg,#E8F5EC,#C8E8D0','Networking':'135deg,#FFF0E8,#FFD8C0','Keynote':'135deg,#1A1915,#333'};
      const grad = trackColors[rData.track] || '135deg,#F3EEFF,#E8D8FF';
      const isKeynote = rData.track === 'Keynote';

      scroll.innerHTML = `
        <div class="detail-banner" style="height:160px">
          <div class="detail-banner-bg" style="background:linear-gradient(${grad})"></div>
          <div style="position:absolute;bottom:16px;left:18px;right:18px">
            ${tagHtml}
            <div style="font-size:20px;font-weight:800;letter-spacing:-.6px;line-height:1.2;color:${isKeynote?'#FFF':' var(--text-1)'}">
              ${esc(data.title)}
            </div>
            <div style="font-size:12px;font-weight:500;color:${isKeynote?'rgba(255,255,255,.7)':'var(--text-2)'};margin-top:4px">${data.time||''} · ${esc(data.room||'')} · ${rData.duration||'45 min'}</div>
          </div>
        </div>

        <div style="padding:16px 18px 0">
          ${rData.stats ? `<div class="detail-stat-row" style="margin-bottom:0">
            <div class="detail-stat"><div class="detail-stat-val">${rData.attendees||'—'}</div><div class="detail-stat-lbl">Going</div></div>
            <div class="detail-stat"><div class="detail-stat-val">${rData.capacity||'—'}</div><div class="detail-stat-lbl">Capacity</div></div>
            <div class="detail-stat" style="background:var(--bz-accent-soft)"><div class="detail-stat-val" style="color:var(--bz-accent)">${rData.attendees&&rData.capacity ? Math.round(rData.attendees/rData.capacity*100)+'%' : '—'}</div><div class="detail-stat-lbl" style="color:var(--bz-accent)">Full</div></div>
          </div>` : ''}
        </div>

        ${rData.description ? `<div class="detail-section">
          <div class="detail-section-title">About this session</div>
          <div class="detail-card" style="font-size:13px;font-weight:500;line-height:1.6;color:var(--text-2)">${esc(rData.description)}</div>
        </div>` : ''}

        ${rData.whatYouLearn && rData.whatYouLearn.length ? `<div class="detail-section">
          <div class="detail-section-title">What you'll learn</div>
          <div class="detail-card">
            ${rData.whatYouLearn.map(l => `<div class="detail-row">
              <div class="detail-row-icon" style="color:var(--bz-accent);background:var(--bz-accent-soft)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
              <div class="detail-row-body"><div class="detail-row-value" style="font-weight:500">${esc(l)}</div></div>
            </div>`).join('')}
          </div>
        </div>` : ''}

        ${rData.relevanceNote ? `<div class="detail-section">
          <div class="detail-section-title">Bizzy says</div>
          <div class="detail-card" style="display:flex;gap:10px;align-items:flex-start">
            <div style="width:32px;height:32px;border-radius:50%;background:var(--bz-accent);display:flex;align-items:center;justify-content:center;flex-shrink:0">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M12 2L13.5 8.5L20 10L13.5 11.5L12 18L10.5 11.5L4 10L10.5 8.5Z"/></svg>
            </div>
            <div style="font-size:13px;font-weight:500;line-height:1.5;color:var(--text-2)">${esc(rData.relevanceNote)}. Based on your interest in ${(data.mutuals||['design','AI']).join(', ')}.</div>
          </div>
        </div>` : ''}

        ${data.speaker ? `<div class="detail-section">
          <div class="detail-section-title">Speaker</div>
          <div class="detail-card" style="cursor:pointer" onclick="openDetailFromSpeaker('${esc(data.speaker)}',${data.speakerSeed||12})">
            <div class="session-speaker-chip">
              <img src="${photo(data.speakerSeed||12)}" alt="">
              <div>
                <div class="session-speaker-chip-name">${esc(data.speaker)}</div>
                <div class="session-speaker-chip-role">Tap to view full profile →</div>
              </div>
            </div>
          </div>
        </div>` : ''}

        <div style="height:80px"></div>
        <div class="detail-cta-bar">
          <button class="peek-btn ${data.inAgenda ? 'peek-btn-secondary' : 'peek-btn-accent'}" style="flex:2" onclick="closeDetailAndAsk('${data.inAgenda ? 'Remove ' + esc(data.title) + ' from my agenda' : 'Add ' + esc(data.title) + ' to my agenda'}')">
            ${data.inAgenda
              ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> In your agenda`
              : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add to agenda`}
          </button>
          <button class="peek-btn peek-btn-secondary" style="flex:1" onclick="closeDetailAndAsk('How do I get to ${esc(data.room||'')}?')">Directions</button>
        </div>`;
    }
  }

  // helpers called from inline onclick in detail HTML
  window.closeDetailAndAsk = function(query) {
    closeDetail();
    STATE.drawerOpen = true;
    ask(query);
  };
  window.openDetailFromSession = function(title) {
    const sData = Object.values(RICH.sessions).find(s => s && title.startsWith(title.slice(0,8))) || {};
    const key = Object.keys(RICH.sessions).find(k => k === title);
    if (!key) return;
    const r = RICH.sessions[key];
    const cardData = {
      type:'session', title: key,
      time: r.time, room: r.room, tag: r.tag,
      speaker: r.speaker, speakerSeed: r.speakerSeed,
      inAgenda: r.inAgenda,
    };
    openDetail('session', cardData);
  };
  window.openDetailFromSpeaker = function(name, seed) {
    const r = RICH.speakers[name];
    if (!r) return;
    openDetail('speaker', { ...r, name, photoSeed: seed });
  };

  /* ══════════════════════════════════════════════════════
     TOP-LEVEL WIRING
  ══════════════════════════════════════════════════════ */
  // Peek sheet
  document.getElementById('peek-scrim').addEventListener('click', closePeek);

  // Detail page back
  document.getElementById('detail-back').addEventListener('click', closeDetail);

  document.getElementById('open-drawer').addEventListener('click', ()=>{
    STATE.drawerOpen = true; renderDrawer();
  });
  document.getElementById('close-drawer').addEventListener('click', ()=>{
    STATE.drawerOpen = false; renderDrawer();
  });
  document.getElementById('drawer-scrim').addEventListener('click', ()=>{
    STATE.drawerOpen = false; renderDrawer();
  });
  document.getElementById('reset-chat').addEventListener('click', ()=>{
    STATE.thread = []; renderDrawer();
  });

  const input = document.getElementById('chat-input');
  const sendBtn = document.getElementById('send-btn');
  function sendInput() {
    const v = input.value.trim();
    if (!v) return;
    input.value = '';
    ask(v);
  }
  sendBtn.addEventListener('click', sendInput);
  input.addEventListener('keydown', e => { if (e.key==='Enter') sendInput(); });

  // Lifecycle locked to live

  render();

  // Measure actual bar heights and set page-body padding precisely.
  // Runs after first render and on resize (orientation change etc.)
  function fitPageBody() {
    const appBar = document.querySelector('.app-bar');
    const tabBar = document.getElementById('tab-bar');
    const pageBody = document.getElementById('page-body');
    if (!appBar || !tabBar || !pageBody) return;
    const topH = appBar.getBoundingClientRect().height;
    const botH = tabBar.getBoundingClientRect().height;
    pageBody.style.paddingTop = topH + 'px';
    pageBody.style.paddingBottom = botH + 'px';
  }

  // Run after DOM paints
  requestAnimationFrame(() => { fitPageBody(); });
  window.addEventListener('resize', fitPageBody);
  window.addEventListener('orientationchange', () => setTimeout(fitPageBody, 200));

})();

})();
</script>
</body>
</html>
